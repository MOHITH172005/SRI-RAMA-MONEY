<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <style>
    body{
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      margin:0;
      color:#1e293b;
    }

    .header{
      display:flex;
      justify-content:space-between;
      padding:20px 30px;
      background:white;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
      border-radius:0 0 20px 20px;
    }

    .cards{
      display:flex;
      gap:20px;
      padding:20px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:15px;
      flex:1;
      min-width:180px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .box{
      margin:20px;
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:10px;
      border-top:1px solid #eee;
    }

    .paid{ color:#22c55e; font-weight:bold; }
    .pending{ color:#ef4444; font-weight:bold; }

    button{
      padding:6px 12px;
      border:none;
      border-radius:6px;
      background:#ef4444;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#dc2626;
    }

    /* 🔥 POPUP STYLE */
    #popup{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#00000088;
      justify-content:center;
      align-items:center;
    }

    #popupBox{
      background:white;
      padding:20px;
      border-radius:10px;
      width:300px;
    }

    #popupBox input{
      width:100%;
      margin:5px 0;
      padding:8px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Welcome, <span id="username">User</span> 👋</h2>
  <div>
    <button onclick="openRequest()" style="background:#22c55e;">Request</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="cards">
  <div class="card"><h4>Total Loan</h4><p id="totalLoan">₹0</p></div>
  <div class="card"><h4>Total Interest</h4><p id="totalInterest">₹0</p></div>
  <div class="card"><h4>Pending</h4><p id="pending">₹0</p></div>
</div>

<div class="box">
  <h3>Your Details</h3>
  <p><b>Name:</b> <span id="name">-</span></p>
  <p><b>Mobile:</b> <span id="mobile"></span></p>
  <p><b>Head:</b> <span id="head">-</span></p>
</div>

<div class="box">
  <h3>Your Loans</h3>

  <table>
    <thead>
      <tr>
        <th>Month</th>
        <th>Amount</th>
        <th>Type</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="loanTable"></tbody>
  </table>
</div>

<!-- 🔥 REQUEST POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3>Loan Request</h3>

    <input id="r_name" placeholder="Name" readonly>
    <input id="r_mobile" placeholder="Mobile" readonly>
    <input id="r_head" placeholder="Head of Family" readonly>
    <input id="r_amount" placeholder="Loan Amount">
    <input id="r_sname" placeholder="Surety Name">
    <input id="r_smobile" placeholder="Surety Mobile">

    <button onclick="submitRequest()" style="background:#22c55e;margin-top:10px;">Submit</button>
    <button onclick="closeRequest()" style="background:gray;margin-top:10px;">Close</button>
  </div>
</div>

<script>
let userData = {};
// ✅ API
let API = "https://script.google.com/macros/s/AKfycbzpxTxwbP9KAC7KIYMCzTagAAabllDmCEsjJb1tUTdhYTeDRonF9OdyjYJ9olOXVVa_/exec";

let mobile = localStorage.getItem("currentUser");

if(!mobile){
  window.location.href="user.html";
}

document.getElementById("mobile").innerText = mobile;

// 🔥 LOAD USER
async function loadData(){
  try{
    let res = await fetch(`${API}?type=getUser&mobile=${mobile}`);
    let data = await res.json();

    // store globally
    userData = data;

    document.getElementById("name").innerText = data.name || "-";
    document.getElementById("head").innerText = data.head || "-";
    document.getElementById("username").innerText = data.name || "User";

  }catch(e){
    alert("Error loading user ❌");
  }
}

// API

async function fetchLoans(){
  try{
    let res = await fetch("https://script.google.com/macros/s/AKfycbzpxTxwbP9KAC7KIYMCzTagAAabllDmCEsjJb1tUTdhYTeDRonF9OdyjYJ9olOXVVa_/exec");
    let data = await res.json();
    return data;
  }catch(e){
    console.error("API error", e);
    return [];
  }
}


async function loadLoans(){

  let res = await fetch(`${API}?type=getRequests&mobile=${mobile}`);
  let data = await res.json();

  console.log("REQUEST DATA:", data); // debug

  let acceptedLoans = data.filter(r => r.status === "accepted");

  renderLoans(acceptedLoans);
}
function renderLoans(loans){

  let table = document.getElementById("loanTable");
  table.innerHTML = "";

  let totalLoan = 0;
  let totalInterest = 0;
  let pending = 0;

  if(loans.length === 0){
    table.innerHTML = `<tr><td colspan="5">No Loans</td></tr>`;
    
    document.getElementById("totalLoan").innerText = "₹0";
    document.getElementById("totalInterest").innerText = "₹0";
    document.getElementById("pending").innerText = "₹0";
    return;
  }

  loans.forEach((l)=>{

    let amount = Number(l.amount);
    let interestRate = 2;

    let interestAmt = (amount * interestRate)/100;

    totalLoan += amount;
    totalInterest += interestAmt;

    let months = [
  {name:"Month 1", amount:interestAmt, type:"Interest"},
  {name:"Month 2", amount:interestAmt, type:"Interest"},
  {name:"Month 3", amount:interestAmt + amount, type:"Final + Principal"}
];

    months.forEach((m,i)=>{

      pending += m.amount;

      table.innerHTML += `
        <tr>
          <td>${m.name}</td>
          <td>₹${m.amount.toFixed(0)}</td>
          <td>${m.type}</td>
          <td class="pending">pending</td>
          <td><button onclick="payReal(${i})">Pay</button></td>
        </tr>
      `;
    });

  });

  document.getElementById("totalLoan").innerText = "₹"+totalLoan;
  document.getElementById("totalInterest").innerText = "₹"+totalInterest.toFixed(0);
  document.getElementById("pending").innerText = "₹"+pending.toFixed(0);
}
// 🔥 PAY
function pay(index){
  loan.status[index] = "paid";
  alert("Paid Month " + (index+1) + " ✅");
  loadLoans();
}

// 🔥 REQUEST FUNCTIONS
function openRequest(){
  document.getElementById("popup").style.display = "flex";

  // 🔥 auto fill from database
  document.getElementById("r_name").value = userData.name || "";
  document.getElementById("r_mobile").value = userData.mobile || mobile;
  document.getElementById("r_head").value = userData.head || "";
}

function closeRequest(){
  document.getElementById("popup").style.display = "none";
}

async function render(){

  let loans = await fetchLoans(); // ✅ API

  let totalGiven=0, totalInterest=0, pending=0, dueToday=0;
  let totalFund = 93000; // fixed treasury
  let today = new Date().toISOString().split("T")[0];

  let table = document.getElementById("loanTable");
  table.innerHTML="";

  loans.forEach(l=>{

    let months = getMonths(l.startDate);
    let amount = Number(l.amount) || 0;
    let interest = Number(l.interest) || 0;

    let interestAmt = (amount * interest / 100) * months;

    totalGiven += amount;

    // ✅ only paid interest added
    if(l.status === "paid"){
      totalInterest += interestAmt;
      totalFund += amount + interestAmt;
    }

    if(l.status==="pending"){
      pending += amount;
    }

    if(l.due === today && l.status==="pending"){
      dueToday++;
    }

    let rowColor="";
    if(l.status==="pending" && l.due < today){
      rowColor="style='background:#fee2e2'";
    }

    table.innerHTML += `
      <tr ${rowColor}>
        <td>${l.name}</td>
        <td>₹${amount}</td>
        <td>₹${interestAmt.toFixed(0)}</td>
        <td>${l.due}</td>
        <td class="${l.status}">${l.status}</td>
      </tr>
    `;
  });

  // ✅ CARD VALUES
  document.getElementById("totalFund").innerText="₹"+totalFund.toFixed(0);
  document.getElementById("totalGiven").innerText="₹"+totalGiven;
  document.getElementById("totalInterest").innerText="₹"+totalInterest.toFixed(0);
  document.getElementById("pending").innerText="₹"+pending;
  document.getElementById("dueToday").innerText=dueToday;

  document.getElementById("alertText").innerText =
    dueToday>0 ? "⚠️ "+dueToday+" payments due today" : "All good";

  // chart
  if(window.myChart){
    window.myChart.destroy();
  }

  window.myChart = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Given","Interest","Total"],
      datasets:[{
        data:[totalGiven,totalInterest,totalFund],
        borderRadius:6
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}


async function submitRequest(){

  let name = document.getElementById("r_name").value;
  let mobileVal = document.getElementById("r_mobile").value;
  let head = document.getElementById("r_head").value;
  let amount = document.getElementById("r_amount").value;
  let sname = document.getElementById("r_sname").value;
  let smobile = document.getElementById("r_smobile").value;

  if(!name || !amount){
    alert("Fill all fields ❌");
    return;
  }

  try{
    let url = `${API}?type=request&name=${encodeURIComponent(name)}&mobile=${mobileVal}&head=${encodeURIComponent(head)}&amount=${amount}&sname=${encodeURIComponent(sname)}&smobile=${smobile}`;

    let res = await fetch(url);
    let text = await res.text();

    if(text === "done"){
      alert("Request Sent ✅");
      closeRequest();
    }else{
      alert("Error ❌");
    }

  }catch(e){
    alert("Network Error ❌");
  }
}

// 🔐 LOGOUT
function logout(){
  localStorage.removeItem("currentUser");
  window.location.href="user.html";
}

// INIT
loadData();
loadLoans();

</script>

</body>
</html>
