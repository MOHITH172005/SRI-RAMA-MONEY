<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <style>
    body{
      font-family: 'Segoe UI';
      background:#f4f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:white;
      padding:30px;
      border-radius:12px;
      width:300px;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);
      text-align:center;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ddd;
      border-radius:8px;
    }

    button{
      padding:10px;
      width:100%;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    h2{
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="text" id="id" placeholder="Enter ID">
  <input type="password" id="pass" placeholder="Enter Password">

  <button onclick="login()">Login</button>
</div>

<script>

function login(){

  let id = document.getElementById("id").value;
  let pass = document.getElementById("pass").value;

  // 🔐 YOUR CREDENTIALS
  if(id === "mohithvalasareddy" && pass === "228x1a3149"){

    localStorage.setItem("admin","true");

    window.location = "admin-dashboard.html";

  }else{
    alert("Invalid Credentials");
  }
}

</script>

</body>
</html>
