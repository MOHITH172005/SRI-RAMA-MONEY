<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:linear-gradient(to right,#eef2ff,#f8fafc);
    }

    .header{
      display:flex;
      justify-content:space-between;
      padding:20px 40px;
      align-items:center;
    }

    .btn{
      padding:10px 18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      color:white;
      font-weight:500;
      transition:0.3s;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:0.9;
    }

    .logout{background:#ef4444;}
    .add{background:#3b82f6;}

    .container{
      padding:20px 40px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.05);
      margin-bottom:20px;
    }

    h3{margin-bottom:10px;}

    table{
      width:100%;
      border-collapse:collapse;
      border-radius:12px;
      overflow:hidden;
    }

    th{
      background:#3b82f6;
      color:white;
    }

    th,td{
      padding:12px;
      border-bottom:1px solid #eee;
      text-align:center;
    }

    tr:hover{background:#f1f5f9;}

    .paid{color:green;font-weight:600;}
    .pending{color:#f59e0b;font-weight:600;}

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
      margin-top:10px;
    }

    .stat-box{
      background:#f8fafc;
      padding:18px;
      border-radius:12px;
      text-align:center;
    }

    #globalLoader{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.7);
      z-index:9999;
      justify-content:center;
      align-items:center;
      font-size:22px;
      color:#3b82f6;
    }
  </style>
</head>

<body>

<div class="header">
  <div>
    <button class="btn add" onclick="goUser()">User Login</button>
    <button class="btn" style="background:#6366f1;" onclick="goAdmin()">Admin Login</button>
  </div>
  <button class="btn logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- 📊 STATS -->
<div class="card">
  <h3>📊 Dashboard Status</h3>
  <div class="stats-grid">
    <div class="stat-box"><p>Total Loans</p><h2 id="totalLoans">0</h2></div>
    <div class="stat-box"><p>Active Loans</p><h2 id="activeLoans">0</h2></div>
    <div class="stat-box"><p>Completed Loans</p><h2 id="completedLoans">0</h2></div>
    <div class="stat-box"><p>Total Amount</p><h2 id="totalAmount">₹0</h2></div>
    <div class="stat-box"><p>Total Interest</p><h2 id="totalInterest">₹0</h2></div>
    <div class="stat-box"><p>Remaining</p><h2 id="remaining">₹0</h2></div>
    <div class="stat-box"><p>Total Treasury</p><h2 id="totalValue">₹0</h2></div>
  </div>
</div>

<!-- 📋 LOANS -->
<div class="card">
  <h3>Loan Records</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Phone</th><th>Amount</th><th>Interest</th>
        <th>M1</th><th>M2</th><th>M3</th><th>Status</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- 📩 REQUESTS -->
<div class="card">
  <h3>Loan Requests</h3>
  <table>
    <thead>
      <tr>
        <th>#</th><th>Name</th><th>Mobile</th><th>Amount</th><th>Surety</th><th>Status</th>
      </tr>
    </thead>
    <tbody id="requestTable"></tbody>
  </table>
</div>

</div>

<div id="globalLoader">⏳ Loading...</div>

<script>

function goUser(){ window.location="user.html"; }
function goAdmin(){ window.location="admin.html"; }

function showLoader(){ globalLoader.style.display="flex"; }
function hideLoader(){ globalLoader.style.display="none"; }

let API="https://script.google.com/macros/s/AKfycbzpxTxwbP9KAC7KIYMCzTagAAabllDmCEsjJb1tUTdhYTeDRonF9OdyjYJ9olOXVVa_/exec";

if(localStorage.getItem("admin")!=="true"){
  window.location="admin.html";
}

//////////////////////////////////////////////////////////
// 📊 LOAD STATS
//////////////////////////////////////////////////////////
async function loadStats(){

  showLoader();

  let TREASURY=93000;

  let res=await fetch(`${API}?type=getRequests&mobile=all`);
  let data=await res.json();

  let loans = data.filter(l => 
    (l.status || "").toLowerCase().trim() === "accepted"
  );

  let totalLoans=loans.length;
  let active=0, completed=0;
  let totalAmt=0, totalInt=0;

  loans.forEach(l=>{
    let amount=Number(l.amount||0);
    let interest=Math.round((amount*2)/100);

    let m1=l.m1||"pending";
    let m2=l.m2||"pending";
    let m3=l.m3||"pending";

    if(m1==="paid") totalInt+=interest;
    if(m2==="paid") totalInt+=interest;
    if(m3==="paid") totalInt+=interest;

    if(m3==="paid") completed++;
    else{
      active++;
      totalAmt+=amount;
    }
  });

  let remaining=TREASURY-totalAmt+totalInt;
  let totalValue=TREASURY+totalInt;

  document.getElementById("totalLoans").innerText = totalLoans;
  document.getElementById("activeLoans").innerText = active;
  document.getElementById("completedLoans").innerText = completed;
  document.getElementById("totalAmount").innerText = "₹"+totalAmt;
  document.getElementById("totalInterest").innerText = "₹"+totalInt;
  document.getElementById("remaining").innerText = "₹"+remaining;
  document.getElementById("totalValue").innerText = "₹"+totalValue;

  hideLoader();
}

//////////////////////////////////////////////////////////
// 📋 RENDER LOANS
//////////////////////////////////////////////////////////
async function render(){

  showLoader();

  let table=document.getElementById("table");
  table.innerHTML="";

  let res=await fetch(`${API}?type=getRequests&mobile=all`);
  let data=await res.json();

  let loans = data.filter(l => 
    (l.status || "").toLowerCase().trim() === "accepted"
  );

  if(loans.length===0){
    table.innerHTML=`<tr><td colspan="9">No Loan Data</td></tr>`;
    hideLoader();
    return;
  }

  loans.forEach((l,i)=>{
    let amount=Number(l.amount||0);
    let interest=Math.round((amount*2)/100);

    let m1=l.m1||"pending";
    let m2=l.m2||"pending";
    let m3=l.m3||"pending";

    let status=(m1==="paid" && m2==="paid" && m3==="paid")?"completed":"active";

    table.innerHTML+=`
    <tr>
      <td>TR-${String(i+1).padStart(3,'0')}</td>
      <td>${l.name}</td>
      <td>${l.mobile}</td>
      <td>₹${amount}</td>
      <td>₹${interest}</td>
      <td class="${m1}">${m1==="paid"?"Paid":"Pending"}</td>
      <td class="${m2}">${m2==="paid"?"Paid":"Pending"}</td>
      <td class="${m3}">${m3==="paid"?"Paid":"Pending"}</td>
      <td>${status}</td>
    </tr>`;
  });

  hideLoader();
}

//////////////////////////////////////////////////////////
// 📩 LOAD REQUESTS
//////////////////////////////////////////////////////////
async function loadRequests(){

  let res=await fetch(`${API}?type=getRequests&mobile=all`);
  let data=await res.json();

  let table=document.getElementById("requestTable");
  table.innerHTML="";

  data.forEach((r,i)=>{
    table.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${r.name}</td>
      <td>${r.mobile}</td>
      <td>₹${r.amount}</td>
      <td>${r.sname||"-"}</td>
      <td>${r.status}</td>
    </tr>`;
  });
}

function logout(){
  localStorage.removeItem("admin");
  window.location="dashboard.html";
}

window.onload=function(){
  loadStats();
  render();
  loadRequests();
};

</script>

</body>
</html>
