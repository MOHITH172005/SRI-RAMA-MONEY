<!DOCTYPE html>
<html>
<head>
  <title>Surety Login</title>
  <style>
    body{
      font-family: Arial;
      padding:20px;
      background:#f4f7fb;
    }
    input{
      padding:10px;
      margin:5px;
      border-radius:6px;
      border:1px solid #ccc;
    }
    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#3b82f6;
      color:white;
    }
    .card{
      background:white;
      padding:15px;
      margin-top:10px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

<h2>Surety Login</h2>

<input id="mobile" placeholder="Surety Mobile">
<input id="password" placeholder="User Mobile (Password)">
<button onclick="login()">Login</button>

<hr>

<div id="list"></div>

<script>

let API = "https://script.google.com/macros/s/AKfycbwN294o561goR-ZXb7PnybLqMlC0UZ-E1aeg2_YcvGuwcSbxiWofCa9UbiyXFb7_lvi/exec";

let currentMobile = "";
let currentUserMobile = "";

//////////////////////////////////////////////////////////
// 🔐 LOGIN
//////////////////////////////////////////////////////////
async function login(){

  let mobile = document.getElementById("mobile").value.trim();
  let password = document.getElementById("password").value.trim();

  if(!mobile || !password){
    alert("Enter all fields ❌");
    return;
  }

  currentMobile = mobile;
  currentUserMobile = password;

  let res = await fetch(`${API}?type=suretyLogin&mobile=${mobile}`);
  let data = await res.json();

  let div = document.getElementById("list");
  div.innerHTML = "";

  // 🔥 FILTER (IMPORTANT)
  let valid = data.filter(d => String(d.userMobile) === String(password));

  if(valid.length === 0){
    div.innerHTML = "No valid requests ❌";
    return;
  }

  valid.forEach(d=>{
    div.innerHTML += `
      <div class="card">
        <b>Name:</b> ${d.name}<br>
        <b>Amount:</b> ₹${d.amount}<br>
        <b>Status:</b> ${d.status}<br><br>

        ${
          d.suretyStatus !== "accepted"
          ? `<button onclick="approve(${d.row})">Accept</button>`
          : `
            ✔ Accepted<br><br>
            ${d.pdfLink ? `<a href="${d.pdfLink}" target="_blank">📄 Download Agreement</a>` : "Waiting for final approval"}
          `
        }
      </div>
    `;
  });
}

//////////////////////////////////////////////////////////
// ✅ APPROVE
//////////////////////////////////////////////////////////
async function approve(row){

  let res = await fetch(`${API}?type=suretyApprove&row=${row}`);
  let text = await res.text();

  if(text === "done"){
    alert("Surety Accepted ✅");
    login(); // reload
  }else{
    alert("Error ❌");
  }
}

</script>

</body>
</html>
